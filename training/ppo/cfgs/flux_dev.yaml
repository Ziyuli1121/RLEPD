run:
  output_root: "exps"
  run_name: "flux_dev"
  seed: 0

data:
  predictor_snapshot: "exps/fflux/network-snapshot-000005.pkl"
  prompt_csv: null

model:
  dataset_name: "ms_coco"
  guidance_type: "cfg"
  guidance_rate: 3.5
  schedule_type: "flowmatch"
  schedule_rho: 1.0
  num_steps: null
  num_points: null
  backend: "flux"
  sigma_min: 0.001
  sigma_max: 1.0
  flowmatch_mu: 1.15
  flowmatch_shift: 3.0
  resolution: 1024
  backend_options:
    model_name_or_path: "black-forest-labs/FLUX.1-dev"
    torch_dtype: "bfloat16"
    enable_model_cpu_offload: false

reward:
  type: "multi"
  weights_path: "weights/HPS_v2.1_compressed.pt"
  batch_size: 1
  enable_amp: true
  cache_dir: "weights"
  multi:
    weights:
      hps: 1.0
      pickscore: 0.0
      imagereward: 0.0
      clip: 0.0
      aesthetic: 0.0
    pickscore:
      model: "yuvalkirstain/PickScore_v1"
      processor: "laion/CLIP-ViT-H-14-laion2B-s32B-b79K"
    imagereward:
      checkpoint: "weights/ImageReward.pt"
      med_config: "weights/med_config.json"
      cache_dir: "weights"
    clip:
      cache_dir: "weights/clip"
    aesthetic:
      predictor_path: "weights/sac+logos+ava1-l14-linearMSE.pth"
      clip_path: "weights/clip"

ppo:
  rollout_batch_size: 8
  rloo_k: 4
  ppo_epochs: 1
  minibatch_size: 4
  learning_rate: 7e-5
  clip_range: 0.2
  kl_coef: 0.0
  entropy_coef: 0.0
  max_grad_norm: 1.0
  decode_rgb: true
  steps: 20000
  dirichlet_concentration: 10
  train_scale_dir: false
  train_scale_time: false

logging:
  log_interval: 1
  save_interval: 200
